# 财务报表分析 Agent 风险识别规则库
# 基于张新民、钱爱民《财务报表分析（第6版·立体化数字教材版）》
# 规则来源：教材第5章"利润质量恶化的主要表现"（12条）+ 各章综合风险信号
# 版本：v2.0 | 最后更新：2026-06-12

rules:
  # ===== 来自教材第5章：利润质量恶化的主要表现 =====

  - rule_id: "R001"
    rule_name: "审计机构频繁变更或年报延迟"
    condition:
      description: "3年内变更审计机构≥2次 或 年报公布日期明显晚于往年"
      threshold_adjustable: false
      source: "教材第5章：利润质量恶化表现第1-2条"
    indicators:
      - "审计机构变更记录"
      - "年报发布日期"
    explanation: >
      频繁更换审计机构可能是"购买审计意见"，年报延迟可能意味着审计过程中存在争议。
      教材明确指出：频繁变更注册会计师的企业，应考虑因业绩下降而不得已造假的可能；
      年报公布日期比正常晚、审计人员发生变化，通常是利润质量恶化的迹象。
    risk_level: "high"
    agent_response: >
      公司近3年更换了{times}次审计机构（{changes}），且/或年报发布日期为{report_date}，
      明显晚于往年。教材指出这是利润质量恶化的常见迹象。建议关注变更原因的披露充分性、
      变更前后审计意见变化，以及是否存在伴随的会计政策调整。

  - rule_id: "R002"
    rule_name: "会计政策或会计估计变更且有利于改善账面利润"
    condition:
      description: "发生重要会计政策或会计估计变更 且变更方向有利于增加当期利润"
      threshold_adjustable: false
      source: "教材第5章：利润质量恶化表现第4条"
    indicators:
      - "会计政策变更记录"
      - "会计估计变更记录"
      - "变更对利润的影响金额"
    explanation: >
      实务中很多企业在不符合准则要求的情况下变更会计政策和估计（如延长折旧年限、
      压低减值计提比例），目的不排除借此改善财务业绩。尤其在企业面临不良经营状况
      或存在IPO、再融资、ST摘帽等特殊需求时，这种变更更值得警惕。
    risk_level: "high"
    agent_response: >
      公司发生了{change_description}，该变更使当期利润增加约{impact}元。教材指出，
      在不符合会计准则要求的情况下变更会计政策和估计以改善账面利润，是利润质量
      恶化的重要信号。建议逐项评估变更的合规性和合理性，以及变更对未来利润的影响。

  - rule_id: "R003"
    rule_name: "应收账款规模不正常增加且收账期变长"
    condition:
      description: "应收账款增长率 > 营业收入增长率×1.5 且营业收入增长率>0"
      threshold_adjustable: true
      suggested_threshold: 1.5
      source: "教材第5章：利润质量恶化表现第5条"
    indicators:
      - "应收账款增长率"
      - "营业收入增长率"
      - "应收账款周转天数"
    explanation: >
      应收账款不正常增加、平均收账期不正常变长，可能是企业为增加营业收入而放宽
      信用政策的结果。过宽的信用政策虽能短期刺激收入增长，但未来将面临大量坏账风险，
      以后年度利润含金量将受影响。教材将此列为利润质量恶化的关键表现。
    risk_level: "high"
    agent_response: >
      应收账款增速（{ar_growth}%）显著高于营业收入增速（{rev_growth}%），且应收
      账款周转天数从{ar_days_prev}天延长至{ar_days_curr}天。教材指出这可能是为增加
      营业收入而放宽信用政策的结果，未来面临坏账风险。建议分析应收账款账龄变化和
      新增客户质量。

  - rule_id: "R004"
    rule_name: "应付账款规模不正常增加且付账期延长"
    condition:
      description: "企业购货和销售状况无重大变化 但应付账款大幅增长且应付账款周转天数显著延长"
      threshold_adjustable: true
      suggested_threshold: "应付账款增长率>营业收入增长率×1.5"
      source: "教材第5章：利润质量恶化表现第6条"
    indicators:
      - "应付账款增长率"
      - "营业收入增长率"
      - "应付账款周转天数"
    explanation: >
      在购货销售状况无重大变化、供应商未放宽信用政策的情况下，应付账款规模不正常
      增加、付账期不正常延长，可能成为企业支付能力恶化、资产质量恶化、利润质量
      恶化的外在表现。背后可能是企业资金链紧张，被迫拖欠供应商款项。
    risk_level: "medium-high"
    agent_response: >
      应付账款增速（{ap_growth}%）远超营业收入增速（{rev_growth}%），应付账款
      周转天数从{ap_days_prev}天延长至{ap_days_curr}天。教材指出这可能成为企业
      支付能力恶化的外在表现。建议结合经营活动现金流和货币资金状况综合判断。

  - rule_id: "R005"
    rule_name: "存货周转过于缓慢"
    condition:
      description: "存货周转天数连续3年上升 且最新值显著高于行业均值"
      threshold_adjustable: true
      source: "教材第5章：利润质量恶化表现第7条"
    indicators:
      - "存货周转天数"
      - "行业存货周转天数"
    explanation: >
      存货周转过于缓慢表明企业在产品质量、价格、存货控制或营销策略等方面出现问题。
      过多存货除了占用资金、增加利息支出外，还会使企业承担存货过时风险、跌价损失
      和保管成本，降低今后年度利润的持续性。
    risk_level: "medium"
    agent_response: >
      存货周转天数从{inv_days_1}天→{inv_days_2}天→{inv_days_3}天，连续3年上升，
      且显著高于行业均值{ind_days}天。教材指出存货周转过慢是利润质量恶化的表现之一。
      建议分析存货结构（原材料/在产品/产成品比例），识别积压原因。

  - rule_id: "R006"
    rule_name: "无形资产或开发支出规模不正常增加"
    condition:
      description: "无形资产或开发支出大幅增长 且无法用正常业务解释"
      threshold_adjustable: true
      source: "教材第5章：利润质量恶化表现第8条"
    indicators:
      - "无形资产增长率"
      - "开发支出增长率"
      - "研发费用资本化率"
    explanation: >
      自创无形资产的研发支出一般计入当期损益。如果无形资产或开发支出出现不正常增加，
      可能是企业将费用资本化以减少对利润表的冲击，形成"虚盈实亏"。
    risk_level: "medium-high"
    agent_response: >
      无形资产增长{ia_growth}%、开发支出增长{dev_growth}%，且研发费用资本化率达
      {cap_rate}%。教材指出，在正常业务无法解释的情况下，这可能是企业将费用资本化
      以掩盖盈利能力下降的行为。建议分析资本化项目的具体内容和合理性。

  - rule_id: "R007"
    rule_name: "业绩过度依赖非经常性损益"
    condition:
      description: "非经常性损益/净利润>0.5 且净利润>0"
      threshold_adjustable: true
      suggested_threshold: 0.5
      source: "教材第5章：利润质量恶化表现第9条"
    indicators:
      - "非经常性损益"
      - "净利润"
      - "扣非净利润"
    explanation: >
      企业利润增长潜力挖尽时，可能通过非经常性损益项目（如处置固定资产收益）来弥补
      核心利润不足。教材特别指出：现行准则将这些非经营性损益"上移至"营业利润中，
      如果读者没有专业分析功底，企业靠非经常性损益"东拼西凑"出来的业绩完全可能
      "蒙混过关"。
    risk_level: "high"
    agent_response: >
      非经常性损益占净利润的{nonrec_pct}%，扣非后净利润仅为{deducted}元。教材指出
      业绩过度依赖非经常性损益是企业利润质量恶化的重要表现。特别提醒：由于现行准则
      将很多非经常性损益列入营业利润，仅看营业利润可能被误导。建议逐项分析非经常性
      损益的具体构成和持续性。

  - rule_id: "R008"
    rule_name: "销售费用、管理费用等期间费用出现反常走势"
    condition:
      description: "营业收入增长但销售费用/管理费用异常下降 或费用率大幅度低于行业均值"
      threshold_adjustable: true
      source: "教材第5章：利润质量恶化表现第10条"
    indicators:
      - "销售费用率"
      - "管理费用率"
      - "营业收入增长率"
    explanation: >
      期间费用中固定部分不随业务量变化，变动部分随业务量变化。收入增加时费用相应
      增加是正常的。如果费用出现异常下降（尤其在收入增长的情况下），往往是人为操纵
      的结果。教材强调"大规模降低期间费用的发生水平是有难度的"。
    risk_level: "medium"
    agent_response: >
      营业收入增长{rev_growth}%，但销售费用率从{se_prev}%骤降至{se_curr}%、
      管理费用率从{me_prev}%骤降至{me_curr}%。教材指出这种反常走势往往是人为操纵
      的结果。建议分析费用下降的具体原因（是真正的效率提升还是推迟确认费用）。

  - rule_id: "R009"
    rule_name: "反常压缩酌量性支出"
    condition:
      description: "研发费用率或广告费等酌量性支出显著下降 且降幅>30%"
      threshold_adjustable: true
      suggested_threshold: 0.3
      source: "教材第5章：利润质量恶化表现第11条"
    indicators:
      - "研发费用率"
      - "广告费等酌量性支出/营业收入"
    explanation: >
      酌量性支出（研发支出、广告费、职工培训支出等）对长期发展至关重要，在一定时期
      内应保持相对稳定。如果大幅降低，可能是企业为避免当期利润下降而蓄意压缩或推迟。
      教材指出这种迹象往往预示着利润质量可能进一步恶化。
    risk_level: "medium"
    agent_response: >
      研发费用率从{rd_prev}%降至{rd_curr}%（变动{delta}个百分点），或其他酌量性支出
      大幅下降。教材指出反常压缩酌量性支出往往预示着利润质量可能进一步恶化。
      建议评估压缩这些支出对企业长期竞争力的潜在影响。

  - rule_id: "R010"
    rule_name: "有足够可分配利润但长期不进行现金分红"
    condition:
      description: "未分配利润>0且金额较大 但连续3年未进行现金分红 且无明确发展规划说明"
      threshold_adjustable: false
      source: "教材第5章：利润质量恶化表现第12条"
    indicators:
      - "未分配利润"
      - "现金股利"
      - "股利支付率"
    explanation: >
      支付现金股利需两个条件：有足够的可供分配利润和有足够的现金支付能力。有足够
      未分配利润但不分红，应首先怀疑企业没有现金支付能力，或管理层对未来发展前景
      或融资能力信心不足。教材将此列为利润质量下降的外在表现。
    risk_level: "medium"
    agent_response: >
      公司未分配利润达{retained}元，但连续3年未进行现金分红（或分红比例极低）。
      教材指出，这应首先怀疑企业没有现金支付能力或管理层对前景信心不足。
      建议结合经营活动现金流和自由现金流判断企业的实际支付能力。

  # ===== 综合各章的风险信号 =====

  - rule_id: "R011"
    rule_name: "存货与应收账款同时异常增长"
    condition:
      description: "存货增长率>营业成本增长率×1.5 且应收账款增长率>营业收入增长率×1.5"
      threshold_adjustable: true
      suggested_threshold: 1.5
      source: "教材第3章：应收账款与存货周转率此消彼长关系的异常"
    indicators:
      - "存货增长率"
      - "应收账款增长率"
      - "营业成本增长率"
      - "营业收入增长率"
    explanation: >
      正常经营下应收账款周转率和存货周转率往往此消彼长（收紧信用→存货积压；
      放宽信用→应收增加存货减少）。两者同时恶化意味着企业面临系统性的经营困境：
      既卖不动货，又收不回款。
    risk_level: "high"
    agent_response: >
      存货增速（{inv_growth}%）和应收账款增速（{ar_growth}%）同时远超各自对应的
      营业成本和营业收入增速。正常经营下这两者应呈此消彼长的关系，同时恶化极为罕见，
      可能意味着企业面临系统性的经营困境。建议同时分析毛利率变化以确认是否面临
      价格战或市场份额流失。

  - rule_id: "R012"
    rule_name: "高杠杆且主要靠金融性负债驱动"
    condition:
      description: "资产金融负债率>50% 且连续上升 且经营性负债占比下降"
      threshold_adjustable: true
      suggested_threshold: 50.0
      source: "教材第2章：资产金融负债率与第4章：资本结构质量分析"
    indicators:
      - "资产金融负债率"
      - "经营性负债占比"
    explanation: >
      教材指出传统资产负债率存在严重局限性（如格力电器资产负债率高但风险很低）。
      改进指标"资产金融负债率"只关注有息的金融性负债。如果金融性负债持续上升
      而经营性负债占比下降，说明企业越来越依赖有成本的借款而非通过商业信用融资，
      财务风险真正在上升。
    risk_level: "high"
    agent_response: >
      资产金融负债率从{prev}%升至{curr}%，同时经营性负债占比从{op_prev}%降至
      {op_curr}%。教材指出金融性负债才是真正的债务负担，其持续上升意味着财务
      风险真正在加大。建议分析借款的具体用途（经营周转/投资扩张/借新还旧）。

  - rule_id: "R013"
    rule_name: "核心利润获现率持续偏低"
    condition:
      description: "核心利润获现率<0.8 且持续时间≥2年（传统工业企业；重资产或高税负行业需调整阈值）"
      threshold_adjustable: true
      suggested_threshold: 0.8
      source: "教材第2章：核心利润获现率（三个有价值现金流量比率中最重要者）"
    indicators:
      - "核心利润获现率"
      - "经营活动现金流量净额"
      - "核心利润"
    explanation: >
      教材独创的核心利润获现率=经营活动现金净流量/核心利润，是评判利润质量的核心指标。
      传统工业企业正常情况下应在1.2-1.5之间（因折旧等因素使现金流大于核心利润）。
      显著偏低且持续说明核心利润缺乏现金支撑。注意：重资产企业（折旧大）可能天然偏高，
      高税负企业（如贵州茅台）可能偏低。
    risk_level: "high"
    agent_response: >
      近{periods}年核心利润获现率分别为{values}，均显著低于0.8。教材指出传统工业
      企业正常情况下应在1.2-1.5之间。当前获现率偏低说明核心利润缺乏现金支撑。
      注意：{industry_note}。建议分析间接法现金流量表，识别导致经营现金流与核心利润
      背离的具体原因。

  - rule_id: "R014"
    rule_name: "毛利率持续下滑"
    condition:
      description: "毛利率连续3年下降 且累计降幅>5个百分点"
      threshold_adjustable: true
      suggested_threshold: 5.0
      source: "教材第3章：存货盈利性分析 + 第5章利润质量分析"
    indicators:
      - "毛利率"
      - "行业毛利率"
    explanation: >
      毛利率反映企业在日常经营活动中的初始获利空间，体现产品竞争力。
      教材强调：同行业中毛利率不断下降，要么意味着产品竞争力下降，要么意味着
      产品生命周期出现转折，要么面临激烈竞争。大幅波动往往是人为操纵成本的信号。
    risk_level: "medium"
    agent_response: >
      毛利率从{year1}年的{gm1}%降至{year3}年的{gm3}%，累计下降{delta}个百分点，
      且{below_industry_note}。教材指出这可能意味着产品竞争力下降或行业竞争加剧。
      建议结合营业收入增长率、市场份额变化和行业景气度综合判断。

  - rule_id: "R015"
    rule_name: "关联方资金占用（其他应收款异常）"
    condition:
      description: "其他应收款/总资产>5% 或 其他应收款大幅增长且无合理解释"
      threshold_adjustable: true
      suggested_threshold: 5.0
      source: "教材第3章：控股股东掏空上市公司 + 第7章关联方关系"
    indicators:
      - "其他应收款"
      - "总资产"
      - "关联交易信息"
    explanation: >
      教材指出，其他应收款巨额增加往往是控股股东利用上市公司融资平台为自身服务
      （即掏空上市公司）的迹象。被关联方占用的资金本质上属于投资资产而非经营资产。
    risk_level: "high"
    agent_response: >
      其他应收款占总资产比例达{ota_pct}%（从{ota_prev}增至{ota_curr}）。
      教材指出这可能是控股股东占用上市公司资金的迹象。建议通过报表附注分析
      其他应收款的具体构成，识别是否存在大额关联方占款及其可回收性。

  - rule_id: "R016"
    rule_name: "经营现金流与核心利润严重背离"
    condition:
      description: "abs(经营活动现金流净额-核心利润)/abs(核心利润)>0.5 且持续2年"
      threshold_adjustable: true
      suggested_threshold: 0.5
      source: "教材第2章+第6章：核心利润获现率分析"
    indicators:
      - "经营活动现金流量净额"
      - "核心利润"
    explanation: >
      教材特别强调不能简单比较经营现金流与净利润（口径差异大），应比较经营现金流
      与核心利润。两者长期大幅背离意味着：要么核心利润的确认过于激进（应收款大），
      要么经营现金流受到非经营因素的严重干扰（如关联方资金往来）。
    risk_level: "medium-high"
    agent_response: >
      经营现金流净额（{ocf}）与核心利润（{cp}）的背离幅度达{deviation}%，
      持续{periods}年。教材指出这提示核心利润的现金获取能力存在问题。
      建议分析间接法现金流量表补充资料中经营性应收应付项目的变动。

  - rule_id: "R017"
    rule_name: "大类资产结构与企业战略承诺严重不符"
    condition:
      description: "企业宣称经营主导型但投资资产占比>40% 或 宣称投资主导型但经营资产占比>60%"
      threshold_adjustable: true
      source: "教材第3章：资产结构与企业战略承诺的吻合性"
    indicators:
      - "经营资产占比"
      - "投资资产占比"
      - "企业战略描述（年报MD&A）"
    explanation: >
      教材强调资产结构应与企业战略承诺吻合。如果企业宣称专注主业但大量资产
      配置于投资领域，或宣称多元化但资产高度集中于单一经营领域，都意味着
      企业言行不一，战略执行存在重大不确定性。
    risk_level: "low-medium"
    agent_response: >
      企业宣称{strategy_claim}，但经营资产占比{oa_pct}%、投资资产占比{ia_pct}%，
      与战略承诺存在显著差异。教材指出这种背离可能意味着战略执行存在问题，
      或控股股东另有图谋。建议进一步分析投资资产的具体投向和回报情况。

  - rule_id: "R018"
    rule_name: "审计意见非标准无保留"
    condition:
      description: "审计意见类型不是'标准无保留意见'"
      threshold_adjustable: false
      source: "教材第8章：审计报告及其对财务信息的质量含义"
    indicators:
      - "审计意见类型"
      - "关键审计事项"
    explanation: >
      教材指出可以通过关注审计意见的类型与措辞间接判断会计质量。非标准审计意见
      是最直接的会计信息质量警告信号。审计报告中提及的关键审计事项也是识别
      会计分析重点领域的依据。
    risk_level: "critical"
    agent_response: >
      审计报告出具了【{opinion_type}】。教材指出审计意见蕴含着极为丰富的会计质量
      信息，非标准意见意味着财务报表可靠性受到质疑。建议：充分理解审计意见的实质
      内容和严重程度后再决定是否基于该财务报表进行分析；如继续分析，所有结论应
      标注这一前提。
